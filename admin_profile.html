<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Profile | Campus Placement Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="recruiter_dashboard.css">
    <link rel="stylesheet" href="admin_profile.css">
</head>

<body>
    <nav class="navbar">
        <div class="brand">
            <a href="admin_dashboard.html"
                style="display: flex; align-items: center; gap: 10px; text-decoration: none; color: white;">
                <img src="logo.png" alt="Logo" style="width: 32px; height: 32px; border-radius: 4px;">
                <span style="font-weight: 600;">Admin Dashboard</span>
            </a>
        </div>
    </nav>

    <div class="profile-container">
        <div style="margin-bottom: 25px;">
            <a href="admin_dashboard.html"
                style="color: var(--primary-dark); text-decoration: none; display: inline-flex; align-items: center; gap: 8px; font-weight: 600; font-size: 0.9375rem; transition: all 0.2s;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Back to Dashboard
            </a>
        </div>
        <div class="profile-card">
            <div class="profile-header">
                <div class="profile-avatar-large" id="profileAvatarLarge">A</div>
                <h2 id="displayAdminName">Admin Profile</h2>
                <p id="displayAdminTitle">Administrator</p>
            </div>

            <div class="profile-content">
                <form id="adminProfileForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="fullName">Full Name</label>
                            <input type="text" id="fullName" placeholder="Enter full name" required>
                        </div>
                        <div class="form-group">
                            <label for="adminTitle">Admin Role</label>
                            <select id="adminTitle" required>
                                <option value="placement-officer">Chief Placement Officer</option>
                                <option value="coordinator">Faculty Coordinator</option>
                                <option value="system-admin">System Administrator</option>
                                <option value="dept-head">Department Head</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="department">Department</label>
                            <input type="text" id="department" placeholder="Enter department" required>
                        </div>
                        <div class="form-group">
                            <label for="collegeName">College Name</label>
                            <input type="text" id="collegeName" placeholder="Enter college name" required>
                        </div>
                        <div class="form-group">
                            <label for="officeLocation">Office Location</label>
                            <input type="text" id="officeLocation" placeholder="Block A, Room 402">
                        </div>
                        <div class="form-group">
                            <label for="contactPhone">Contact Phone</label>
                            <input type="tel" id="contactPhone" placeholder="Extension or Phone">
                        </div>
                    </div>

                    <div id="statusMsg" class="status-msg"></div>

                    <div class="actions">
                        <button type="button" class="btn btn-secondary"
                            onclick="location.href='admin_dashboard.html'">Back to Dashboard</button>
                        <button type="submit" class="btn btn-primary" id="saveBtn">Save Profile</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script type="module" src="admin_profile.js"></script>
</body>

</html>
