<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan QR for Attendance | Campus Placement Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="student_qr_scanner.css">
    <link rel="stylesheet" href="student_qr_scanner_extra.css">
    <!-- html5-qrcode library for camera access and QR scanning -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>

<body>

    <!-- Top Navigation Bar -->
    <nav class="navbar">
        <div class="brand">
            <img src="logo.png" alt="Placement Logo" style="width: 32px; height: 32px; border-radius: 4px;">
        </div>
        <div class="nav-links">
            <a href="home.html" class="btn-back-dashboard">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Back to Dashboard
            </a>
            <div class="avatar">JS</div>
        </div>
    </nav>

    <main class="container">
        <!-- Page Header -->
        <header class="page-header">
            <h1>Mark Your Attendance</h1>
            <p>Scan the QR code displayed at the venue to register your presence for Pre-Placement Talks and Events.</p>
        </header>

        <section class="scanner-section">
            <div class="scanner-container">
                <!-- Status Bar -->
                <div class="status-bar" id="status-bar">
                    <div class="pulse" id="status-pulse"></div>
                    <span id="status-text">Camera ready to scan</span>
                </div>

                <!-- Camera Viewport -->
                <div class="viewport-wrapper">
                    <div id="reader" width="600px"></div>
                    <!-- Overlay for scanning animation -->
                    <div class="scan-overlay" id="scan-overlay" style="display: none;">
                        <div class="scan-line"></div>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="action-panel">
                    <button class="btn-primary" id="btn-start" onclick="startScanner()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z">
                            </path>
                            <circle cx="12" cy="13" r="4"></circle>
                        </svg>
                        Start Camera
                    </button>
                    <button class="btn-secondary" id="btn-stop" onclick="stopScanner()" style="display: none;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <rect x="9" y="9" width="6" height="6"></rect>
                        </svg>
                        Stop Camera
                    </button>
                </div>
            </div>

            <!-- Result Card -->
            <div class="result-card" id="result-card" style="display: none;">
                <div class="success-icon">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                        <polyline points="22 4 12 14.01 9 11.01"></polyline>
                    </svg>
                </div>
                <h2>Attendance Marked!</h2>

                <div class="event-details">
                    <div class="detail-row">
                        <span class="label">Event / Company:</span>
                        <span class="value" id="res-company">-</span>
                    </div>
                    <div class="detail-row">
                        <span class="label">Event ID:</span>
                        <span class="value" id="res-event-id">-</span>
                    </div>
                    <div class="detail-row">
                        <span class="label">Time Logged:</span>
                        <span class="value" id="res-time">-</span>
                    </div>
                </div>

                <button class="btn-secondary" onclick="resetScanner()" style="margin-top: 1.5rem; width: 100%;">
                    Scan Another Code
                </button>
            </div>
        </section>
    </main>

    <script src="student_qr_scanner.js"></script>
</body>

</html>
