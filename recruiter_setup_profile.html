<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Complete your Recruiter profile on the Campus Placement Management System">
    <title>Recruiter Profile Setup | Campus Placement Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="recruiter_setup_profile.css">
</head>

<body>

    <div class="login-wrapper">
        <!-- Left Branding side -->
        <div class="login-info-section">
            <div class="brand-logo-container">
                <img src="logo.png" alt="Logo">
            </div>
            <h2>Almost there!</h2>
            <p>Tell us about your company and hiring goals to get started.</p>

            <ul class="features-list">
                <li>
                    <span class="check-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"
                            stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                    </span>
                    Post job openings fast
                </li>
                <li>
                    <span class="check-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"
                            stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                    </span>
                    Filter top candidates
                </li>
                <li>
                    <span class="check-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"
                            stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                    </span>
                    Schedule interviews easily
                </li>
            </ul>
        </div>

        <!-- Right Form side -->
        <div class="login-form-section">
            <div class="setup-header">
                <h1>Complete Your Profile</h1>
                <p>Tell us about your company and hiring goals.</p>
            </div>

            <form action="#" method="POST" id="profile-setup-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="company-site">Company Website</label>
                        <input type="url" id="company-site" class="form-control" placeholder="https://company.com"
                            required>
                    </div>
                    <div class="form-group">
                        <label for="industry">Industry</label>
                        <select id="industry" class="form-control" required>
                            <option value="">Select Industry...</option>
                            <option value="it">Software / IT</option>
                            <option value="finance">Finance / FinTech</option>
                            <option value="healthcare">Healthcare</option>
                            <option value="manufacturing">Core / Manufacturing</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="designation">Your Designation</label>
                    <input type="text" id="designation" class="form-control" placeholder="e.g. HR Manager, Tech Lead"
                        required>
                </div>

                <div class="form-group">
                    <label for="company-size">Company Size</label>
                    <select id="company-size" class="form-control" required>
                        <option value="">Select Size...</option>
                        <option value="startup">1 - 50 Employees</option>
                        <option value="mid">51 - 500 Employees</option>
                        <option value="enterprise">500+ Employees</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="linkedin">LinkedIn Profile (Optional)</label>
                    <input type="url" id="linkedin" class="form-control" placeholder="https://linkedin.com/in/profile">
                </div>

                <button type="submit" class="btn-submit">Finish Setup & Go to
                    Dashboard</button>
            </form>

            <div class="sign-up-link">
                <a href="index.html">← Back to Sign In</a>
            </div>
        </div>
    </div>

    <script type="module" src="recruiter_setup_profile.js"></script>
</body>

</html>
