<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Complete your Admin profile on the Campus Placement Management System">
    <title>Admin Profile Setup | Campus Placement Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="admin_setup_profile.css">
</head>

<body>

    <div class="login-wrapper">
        <!-- Left Branding side -->
        <div class="login-info-section">
            <div class="brand-logo-container">
                <img src="logo.png" alt="Logo" style="width: 40px; height: 40px;">
            </div>
            <h2>Admin Setup</h2>
            <p>Configure your administrative profile and capabilities to manage the placement system.</p>

            <ul class="features-list">
                <li>
                    <span class="check-icon" style="background: #2563eb; width: 20px; height: 20px;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"
                            stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                    </span>
                    Manage student data
                </li>
                <li>
                    <span class="check-icon" style="background: #2563eb; width: 20px; height: 20px;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"
                            stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                    </span>
                    Organize placement drives
                </li>
                <li>
                    <span class="check-icon" style="background: #2563eb; width: 20px; height: 20px;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"
                            stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                    </span>
                    Track live attendance
                </li>
            </ul>
        </div>

        <!-- Right Form side -->
        <!-- Right Form side -->
        <div class="login-form-section" style="overflow-y: auto;">
            <div class="setup-header">
                <h1>Admin Profile Setup</h1>
                <p>Configure your administrative capabilities.</p>
            </div>

            <form action="#" method="POST" id="profile-setup-form">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div class="form-group">
                        <label for="full-name" style="font-size: 0.75rem; color: #64748b; margin-bottom: 4px;">Full
                            Name</label>
                        <input type="text" id="full-name" class="form-control" placeholder="Dr. Ramesh Kumar" required>
                    </div>
                    <div class="form-group">
                        <label for="admin-title" style="font-size: 0.75rem; color: #64748b; margin-bottom: 4px;">Admin
                            Role</label>
                        <select id="admin-title" class="form-control" required>
                            <option value="">Select Role...</option>
                            <option value="placement-officer">Chief Placement Officer</option>
                            <option value="coordinator">Faculty Coordinator</option>
                            <option value="system-admin">System Administrator</option>
                            <option value="dept-head">Department Head</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="department"
                        style="font-size: 0.75rem; color: #64748b; margin-bottom: 4px;">Department</label>
                    <input type="text" id="department" class="form-control" placeholder="Computer Science" required>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div class="form-group">
                        <label for="office" style="font-size: 0.75rem; color: #64748b; margin-bottom: 4px;">Office
                            Location</label>
                        <input type="text" id="office" class="form-control" placeholder="Block A, 402">
                    </div>
                    <div class="form-group">
                        <label for="contact-number"
                            style="font-size: 0.75rem; color: #64748b; margin-bottom: 4px;">Internal Phone</label>
                        <input type="tel" id="contact-number" class="form-control" placeholder="Ext 402">
                    </div>
                </div>

                <div class="form-group">
                    <label for="college-name" style="font-size: 0.75rem; color: #64748b; margin-bottom: 4px;">College
                        Name</label>
                    <input type="text" id="college-name" class="form-control" placeholder="RV College of Engineering"
                        required>
                </div>

                <button type="submit" class="btn-submit" style="margin-top: 10px;">Finish Setup & Go to
                    Dashboard</button>
            </form>

            <div class="sign-up-link" style="margin-top: 16px;">
                <a href="index.html">← Back to Sign In</a>
            </div>
        </div>
    </div>

    <script type="module" src="admin_setup_profile.js"></script>
</body>

</html>
