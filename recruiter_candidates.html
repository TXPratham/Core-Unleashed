<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidates | Campus Placement Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="recruiter_dashboard.css">
    <link rel="stylesheet" href="recruiter_candidates.css">
</head>

<body>
    <nav class="navbar">
        <div class="brand">
            <img src="logo.png" alt="Placement Logo" style="width: 32px; height: 32px; border-radius: 4px;">
        </div>
        <div class="nav-links">
            <a href="index.html" class="btn-back-dashboard">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Sign Out
            </a>
            <a href="recruiter_dashboard.html" class="nav-item">Dashboard</a>
            <a href="recruiter_post_job.html" class="nav-item">Job Postings</a>
            <a href="recruiter_candidates.html" class="nav-item active">Candidates</a>
            <a href="#" class="nav-item">Interviews</a>
            <div class="avatar" id="recruiterAvatar" style="cursor:pointer;" title="Recruiter Profile">R</div>
        </div>
    </nav>

    <div class="page-container">
        <div class="back-nav">
            <a href="recruiter_dashboard.html" class="back-link">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Back to Dashboard
            </a>
        </div>

        <div class="candidates-card">
            <div class="card-header">
                <h2>All Candidates</h2>
                <div class="search-box">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="candidateSearch" placeholder="Search by name or role...">
                </div>
            </div>

            <div class="candidates-table-container">
                <table id="candidatesTable">
                    <thead>
                        <tr>
                            <th>Candidate</th>
                            <th>Applied Role</th>
                            <th>Status</th>
                            <th>Date Applied</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="candidatesList">
                        <!-- Data will be populated here -->
                        <tr class="loading-row">
                            <td colspan="5" style="text-align: center; padding: 40px; color: var(--text-muted);">
                                Loading candidates...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div id="emptyState" class="empty-state" style="display: none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                    <circle cx="9" cy="7" r="4"></circle>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                </svg>
                <p>No candidates found matching your criteria.</p>
            </div>
        </div>
    </div>

    <script type="module" src="recruiter_candidates.js"></script>
</body>

</html>
