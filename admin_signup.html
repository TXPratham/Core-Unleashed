<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create an Admin account on the Campus Placement Management System">
    <title>Admin Sign Up | Campus Placement Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="admin_signup.css">
</head>

<body>
    <div class="login-wrapper">
        <div class="login-info-section">
            <div class="brand-logo-container">
                <img src="logo.png" alt="Logo" style="width: 40px; height: 40px;">
            </div>
            <h2>Admin Portal Access</h2>
            <p>Manage placement drives, student profiles, and coordinate with top recruiters seamlessly.</p>
            <ul class="features-list">
                <li>
                    <span class="check-icon" style="background: #2563eb; width: 20px; height: 20px;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"
                            stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                    </span>
                    Manage User Roles
                </li>
                <li>
                    <span class="check-icon" style="background: #2563eb; width: 20px; height: 20px;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"
                            stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                    </span>
                    Coordinate Placement Drives
                </li>
                <li>
                    <span class="check-icon" style="background: #2563eb; width: 20px; height: 20px;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"
                            stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                    </span>
                    Access Global Analytics
                </li>
            </ul>
        </div>

        <div class="login-form-section">
            <div class="login-header">
                <h1>Admin Sign Up</h1>
                <p>Please enter your details to create an admin account</p>
            </div>

            <form id="signup-form">
                <div class="role-selector">
                    <label class="role-option">
                        <input type="radio" name="role" value="recruiter"
                            onchange="window.location.href='recruiter_signup.html'">
                        <span class="role-btn">Recruiter</span>
                    </label>
                    <label class="role-option">
                        <input type="radio" name="role" value="admin" checked>
                        <span class="role-btn">Admin</span>
                    </label>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div class="form-group">
                        <label for="fullname" style="font-size: 0.75rem; color: #64748b; margin-bottom: 4px;">Full
                            Name</label>
                        <input type="text" id="fullname" class="form-control" placeholder="Admin Name" required>
                    </div>
                    <div class="form-group">
                        <label for="department"
                            style="font-size: 0.75rem; color: #64748b; margin-bottom: 4px;">Department</label>
                        <input type="text" id="department" class="form-control" placeholder="Placement Cell" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email" style="font-size: 0.75rem; color: #64748b; margin-bottom: 4px;">Staff
                        Email</label>
                    <input type="email" id="email" class="form-control" placeholder="admin@college.edu" required>
                </div>

                <div class="form-group">
                    <label for="phone" style="font-size: 0.75rem; color: #64748b; margin-bottom: 4px;">Phone
                        Number</label>
                    <input type="tel" id="phone" class="form-control" placeholder="+91 00000 00000" required>
                </div>

                <div class="form-group">
                    <label for="password"
                        style="font-size: 0.75rem; color: #64748b; margin-bottom: 4px;">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Create a new password"
                        required>
                </div>

                <button type="submit" class="btn-submit">Create Account</button>
            </form>
            <div class="sign-up-link" style="margin-top: 15px; font-weight: 500;">
                Already have an account? <a href="index.html"
                    style="color: #2563eb; text-decoration: none; font-weight: 600;">Sign In</a>
            </div>
        </div>
    </div>
    <script type="module" src="admin_signup.js"></script>
</body>

</html>
