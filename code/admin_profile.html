<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Profile | Campus Placement Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="recruiter_dashboard.css">
    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #60a5fa;
            --primary-dark: #1e40af;
            --bg-main: #f0f9ff;
            --text-main: #0f172a;
            --text-muted: #475569;
            --white: #ffffff;
            --hero-gradient: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            --card-shadow: 0 10px 25px rgba(37, 99, 235, 0.1);
            --border-color: rgba(37, 99, 235, 0.1);
        }

        body {
            background: #f0f9ff;
            background-image: radial-gradient(at 0% 0%, #eff6ff 0%, transparent 50%),
                radial-gradient(at 100% 0%, #e0f2fe 100% 0%, transparent 50%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        .navbar {
            background: var(--hero-gradient) !important;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .profile-container {
            max-width: 800px;
            margin: 120px auto 40px;
            padding: 0 20px;
        }

        .profile-card {
            background: white;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .profile-header {
            background: var(--hero-gradient);
            padding: 40px;
            text-align: center;
            color: white;
            position: relative;
        }

        .profile-avatar-large {
            width: 100px;
            height: 100px;
            background: white;
            color: var(--primary);
            font-size: 3rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin: 0 auto 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .profile-content {
            padding: 40px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        input,
        select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.2s;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .actions {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            justify-content: flex-end;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .btn-primary {
            background: var(--hero-gradient);
            color: white;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(37, 99, 235, 0.3);
        }

        .btn-secondary {
            background: #f1f5f9;
            color: var(--text-muted);
        }

        .btn-secondary:hover {
            background: #e2e8f0;
        }

        .status-msg {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            display: none;
        }

        .status-msg.success {
            background: #dcfce7;
            color: #166534;
            display: block;
        }

        .status-msg.error {
            background: #fee2e2;
            color: #991b1b;
            display: block;
        }

        @media (max-width: 640px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .form-group.full-width {
                grid-column: span 1;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="brand">
            <a href="admin_dashboard.html"
                style="display: flex; align-items: center; gap: 10px; text-decoration: none; color: white;">
                <img src="logo.png" alt="Logo" style="width: 32px; height: 32px; border-radius: 4px;">
                <span style="font-weight: 600;">Admin Dashboard</span>
            </a>
        </div>
    </nav>

    <div class="profile-container">
        <div class="profile-card">
            <div class="profile-header">
                <div class="profile-avatar-large" id="profileAvatarLarge">A</div>
                <h2 id="displayAdminName">Admin Profile</h2>
                <p id="displayAdminTitle">Administrator</p>
            </div>

            <div class="profile-content">
                <form id="adminProfileForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="fullName">Full Name</label>
                            <input type="text" id="fullName" placeholder="Enter full name" required>
                        </div>
                        <div class="form-group">
                            <label for="adminTitle">Admin Role</label>
                            <select id="adminTitle" required>
                                <option value="placement-officer">Chief Placement Officer</option>
                                <option value="coordinator">Faculty Coordinator</option>
                                <option value="system-admin">System Administrator</option>
                                <option value="dept-head">Department Head</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="department">Department</label>
                            <input type="text" id="department" placeholder="Enter department" required>
                        </div>
                        <div class="form-group">
                            <label for="collegeName">College Name</label>
                            <input type="text" id="collegeName" placeholder="Enter college name" required>
                        </div>
                        <div class="form-group">
                            <label for="officeLocation">Office Location</label>
                            <input type="text" id="officeLocation" placeholder="Block A, Room 402">
                        </div>
                        <div class="form-group">
                            <label for="contactPhone">Contact Phone</label>
                            <input type="tel" id="contactPhone" placeholder="Extension or Phone">
                        </div>
                    </div>

                    <div id="statusMsg" class="status-msg"></div>

                    <div class="actions">
                        <button type="button" class="btn btn-secondary"
                            onclick="location.href='admin_dashboard.html'">Back to Dashboard</button>
                        <button type="submit" class="btn btn-primary" id="saveBtn">Save Profile</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase_setup.js';
        import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js';
        import { doc, getDoc, setDoc } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js';

        const profileForm = document.getElementById('adminProfileForm');
        const saveBtn = document.getElementById('saveBtn');
        const statusMsg = document.getElementById('statusMsg');
        const avatarLarge = document.getElementById('profileAvatarLarge');
        const displayName = document.getElementById('displayAdminName');
        const displayTitle = document.getElementById('displayAdminTitle');

        let currentUser = null;

        // onAuthStateChanged(auth, async (user) => {
        //     if (user) {
        //         currentUser = user;
        //         loadProfileData(user.uid);
        //     } else {
        //         window.location.href = 'login.html';
        //     }
        // });

        async function loadProfileData(uid) {
            try {
                const adminDoc = await getDoc(doc(db, 'admins', uid));
                if (adminDoc.exists()) {
                    const data = adminDoc.data();
                    document.getElementById('fullName').value = data.fullName || '';
                    document.getElementById('adminTitle').value = data.adminTitle || '';
                    document.getElementById('department').value = data.department || '';
                    document.getElementById('collegeName').value = data.collegeName || '';
                    document.getElementById('officeLocation').value = data.officeLocation || '';
                    document.getElementById('contactPhone').value = data.contactPhone || '';

                    updateDisplayHeader(data.fullName, data.adminTitle);
                }
            } catch (error) {
                console.error("Error loading profile:", error);
                showStatus("Error loading profile data.", "error");
            }
        }

        function updateDisplayHeader(name, title) {
            if (name) {
                avatarLarge.textContent = name.charAt(0).toUpperCase();
                displayName.textContent = name;
            }
            if (title) {
                const titleMap = {
                    'placement-officer': 'Chief Placement Officer',
                    'coordinator': 'Faculty Coordinator',
                    'system-admin': 'System Administrator',
                    'dept-head': 'Department Head'
                };
                displayTitle.textContent = titleMap[title] || title;
            }
        }

        function showStatus(msg, type) {
            statusMsg.textContent = msg;
            statusMsg.className = `status-msg ${type}`;
            setTimeout(() => {
                statusMsg.style.display = 'none';
            }, 5000);
        }

        profileForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUser) return;

            saveBtn.textContent = 'Saving...';
            saveBtn.disabled = true;

            const profileData = {
                uid: currentUser.uid,
                fullName: document.getElementById('fullName').value,
                adminTitle: document.getElementById('adminTitle').value,
                department: document.getElementById('department').value,
                collegeName: document.getElementById('collegeName').value,
                officeLocation: document.getElementById('officeLocation').value,
                contactPhone: document.getElementById('contactPhone').value,
                updatedAt: new Date()
            };

            try {
                // Save to 'admins' collection
                await setDoc(doc(db, 'admins', currentUser.uid), profileData);

                // Update 'users' collection with the name for quick access in dashboard
                await setDoc(doc(db, 'users', currentUser.uid), {
                    fullName: profileData.fullName,
                    adminTitle: profileData.adminTitle
                }, { merge: true });

                updateDisplayHeader(profileData.fullName, profileData.adminTitle);
                showStatus("Profile updated successfully!", "success");
            } catch (error) {
                console.error("Error saving profile:", error);
                showStatus("Failed to update profile.", "error");
            } finally {
                saveBtn.textContent = 'Save Profile';
                saveBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
