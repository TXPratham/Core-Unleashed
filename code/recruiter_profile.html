<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recruiter Profile | Campus Placement Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="recruiter_dashboard.css">
    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #60a5fa;
            --primary-dark: #1e40af;
            --bg-main: #f0f9ff;
            --text-main: #0f172a;
            --text-muted: #475569;
            --white: #ffffff;
            --hero-gradient: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            --card-shadow: 0 10px 25px rgba(37, 99, 235, 0.1);
            --border-color: rgba(37, 99, 235, 0.1);
        }

        body {
            background: #f0f9ff;
            background-image: radial-gradient(at 0% 0%, #eff6ff 0%, transparent 50%),
                radial-gradient(at 100% 0%, #e0f2fe 100% 0%, transparent 50%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        .navbar {
            background: var(--hero-gradient) !important;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .profile-container {
            max-width: 900px;
            margin: 120px auto 40px;
            padding: 0 20px;
        }

        .profile-card {
            background: white;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .profile-header {
            background: var(--hero-gradient);
            padding: 50px 40px;
            text-align: center;
            color: white;
            position: relative;
        }

        .profile-avatar-large {
            width: 100px;
            height: 100px;
            background: white;
            color: var(--primary);
            font-size: 2.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin: 0 auto 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .profile-content {
            padding: 40px;
        }

        .section-title {
            font-size: 1.125rem;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--bg-main);
            grid-column: span 2;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .form-group {
            margin-bottom: 5px;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        label {
            display: block;
            font-size: 0.8125rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.025em;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.2s;
            background: #f8fafc;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
            background: white;
        }

        .actions {
            margin-top: 40px;
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }

        .btn {
            padding: 12px 28px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-size: 0.9375rem;
        }

        .btn-primary {
            background: var(--hero-gradient);
            color: white;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(37, 99, 235, 0.3);
        }

        .btn-secondary {
            background: #f1f5f9;
            color: var(--text-muted);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-secondary:hover {
            background: #e2e8f0;
        }

        .status-msg {
            margin-top: 20px;
            padding: 14px;
            border-radius: 8px;
            text-align: center;
            display: none;
            font-weight: 500;
        }

        .status-msg.success {
            background: #dcfce7;
            color: #166534;
            display: block;
        }

        .status-msg.error {
            background: #fee2e2;
            color: #991b1b;
            display: block;
        }

        @media (max-width: 640px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .form-group.full-width {
                grid-column: span 1;
            }

            .section-title {
                grid-column: span 1;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="brand">
            <img src="logo.png" alt="Placement Logo" style="width: 32px; height: 32px; border-radius: 4px;">
        </div>
        <div class="nav-links">
            <a href="login.html" class="btn-back-dashboard">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Sign Out
            </a>
            <a href="recruiter_dashboard.html" class="nav-item">Dashboard</a>
            <a href="recruiter_post_job.html" class="nav-item">Job Postings</a>
            <a href="#" class="nav-item">Candidates</a>
            <a href="#" class="nav-item">Interviews</a>
            <div class="avatar" id="recruiterAvatar" style="cursor:pointer;" title="Recruiter Profile">R</div>
        </div>
    </nav>

    <div class="profile-container">
        <div style="margin-bottom: 25px;">
            <a href="recruiter_dashboard.html"
                style="color: var(--primary-dark); text-decoration: none; display: inline-flex; align-items: center; gap: 8px; font-weight: 600; font-size: 0.9375rem; transition: all 0.2s;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Back to Dashboard
            </a>
        </div>
        <div class="profile-card">
            <div class="profile-header">
                <div class="profile-avatar-large" id="profileAvatarLarge">R</div>
                <h2 id="displayRecruiterName">Recruiter Profile</h2>
                <p id="displayCompanyName">Company Name</p>
            </div>

            <div class="profile-content">
                <form id="recruiterProfileForm">
                    <div class="form-grid">
                        <h3 class="section-title">Personal Information</h3>
                        <div class="form-group">
                            <label for="fullname">Full Name</label>
                            <input type="text" id="fullname" placeholder="Enter your full name" required>
                        </div>
                        <div class="form-group">
                            <label for="designation">Your Designation</label>
                            <input type="text" id="designation" placeholder="e.g. Talent Acquisition Lead" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Work Email</label>
                            <input type="email" id="email" disabled title="Email cannot be changed">
                        </div>
                        <div class="form-group">
                            <label for="phone">Phone Number</label>
                            <input type="tel" id="phone" placeholder="+1 (555) 000-0000" required>
                        </div>

                        <h3 class="section-title">Company Information</h3>
                        <div class="form-group">
                            <label for="company_name">Company Name</label>
                            <input type="text" id="company_name" placeholder="Enter company name" required>
                        </div>
                        <div class="form-group">
                            <label for="industry">Industry</label>
                            <select id="industry" required>
                                <option value="">Select Industry...</option>
                                <option value="it">Software / IT</option>
                                <option value="finance">Finance / FinTech</option>
                                <option value="healthcare">Healthcare</option>
                                <option value="manufacturing">Core / Manufacturing</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="companyWebsite">Company Website</label>
                            <input type="url" id="companyWebsite" placeholder="https://company.com" required>
                        </div>
                        <div class="form-group">
                            <label for="companySize">Company Size</label>
                            <select id="companySize" required>
                                <option value="">Select Size...</option>
                                <option value="startup">1 - 50 Employees</option>
                                <option value="mid">51 - 500 Employees</option>
                                <option value="enterprise">500+ Employees</option>
                            </select>
                        </div>
                        <div class="form-group full-width">
                            <label for="linkedin">LinkedIn Profile (Optional)</label>
                            <input type="url" id="linkedin" placeholder="https://linkedin.com/in/yourcompany">
                        </div>
                    </div>

                    <div id="statusMsg" class="status-msg"></div>

                    <div class="actions">
                        <a href="recruiter_dashboard.html" class="btn btn-secondary">Back to Dashboard</a>
                        <button type="submit" class="btn btn-primary" id="saveBtn">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase_setup.js';
        import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js';
        import { doc, getDoc, setDoc } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js';

        const profileForm = document.getElementById('recruiterProfileForm');
        const saveBtn = document.getElementById('saveBtn');
        const statusMsg = document.getElementById('statusMsg');
        const avatarLarge = document.getElementById('profileAvatarLarge');
        const recruiterAvatarNav = document.getElementById('recruiterAvatar');
        const displayName = document.getElementById('displayRecruiterName');
        const displayCompany = document.getElementById('displayCompanyName');

        let currentUser = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                loadProfileData(user.uid);
            } else {
                window.location.href = 'login.html';
            }
        });

        recruiterAvatarNav.onclick = () => {
            window.location.href = 'recruiter_profile.html';
        };

        async function loadProfileData(uid) {
            try {
                // 1. Fetch data from 'users' collection (base data)
                const userDoc = await getDoc(doc(db, 'users', uid));
                if (userDoc.exists()) {
                    const userData = userDoc.data();
                    document.getElementById('fullname').value = userData.fullname || '';
                    document.getElementById('email').value = userData.email || '';
                    document.getElementById('phone').value = userData.phone || '';
                    document.getElementById('company_name').value = userData.company_name || '';

                    if (userData.fullname) {
                        const initials = userData.fullname.split(' ').map(n => n.charAt(0)).join('').toUpperCase().substring(0, 2);
                        recruiterAvatarNav.textContent = initials;
                        recruiterAvatarNav.title = `${userData.fullname} (${userData.company_name || 'Recruiter'})`;
                    }
                    updateDisplayHeader(userData.fullname, userData.company_name);
                }

                // 2. Fetch specific data from 'recruiters' collection
                const recruiterDoc = await getDoc(doc(db, 'recruiters', uid));
                if (recruiterDoc.exists()) {
                    const recData = recruiterDoc.data();
                    document.getElementById('companyWebsite').value = recData.companyWebsite || '';
                    document.getElementById('industry').value = recData.industry || '';
                    document.getElementById('designation').value = recData.designation || '';
                    document.getElementById('companySize').value = recData.companySize || '';
                    document.getElementById('linkedin').value = recData.linkedin || '';
                }
            } catch (error) {
                console.error("Error loading profile:", error);
                showStatus("Error loading profile data.", "error");
            }
        }

        function updateDisplayHeader(name, company) {
            if (name) {
                avatarLarge.textContent = name.split(' ').map(n => n.charAt(0)).join('').toUpperCase().substring(0, 2);
                displayName.textContent = name;
            }
            if (company) {
                displayCompany.textContent = company;
            }
        }

        function showStatus(msg, type) {
            statusMsg.textContent = msg;
            statusMsg.className = `status-msg ${type}`;
            statusMsg.style.display = 'block';
            setTimeout(() => {
                statusMsg.style.display = 'none';
            }, 6000);
        }

        profileForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUser) return;

            saveBtn.textContent = 'Saving...';
            saveBtn.disabled = true;

            const baseData = {
                fullname: document.getElementById('fullname').value,
                phone: document.getElementById('phone').value,
                company_name: document.getElementById('company_name').value,
            };

            const recData = {
                uid: currentUser.uid,
                companyWebsite: document.getElementById('companyWebsite').value,
                industry: document.getElementById('industry').value,
                designation: document.getElementById('designation').value,
                companySize: document.getElementById('companySize').value,
                linkedin: document.getElementById('linkedin').value,
                updatedAt: new Date()
            };

            try {
                // Update 'users' collection
                await setDoc(doc(db, 'users', currentUser.uid), baseData, { merge: true });

                // Update 'recruiters' collection
                await setDoc(doc(db, 'recruiters', currentUser.uid), recData);

                updateDisplayHeader(baseData.fullname, baseData.company_name);
                showStatus("Profile updated successfully!", "success");
            } catch (error) {
                console.error("Error saving profile:", error);
                showStatus("Failed to update profile.", "error");
            } finally {
                saveBtn.textContent = 'Save Changes';
                saveBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
