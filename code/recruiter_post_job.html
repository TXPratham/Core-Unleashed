<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post New Job | Campus Placement Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="recruiter_dashboard.css">
    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #60a5fa;
            --primary-dark: #1e40af;
            --bg-main: #f0f9ff;
            --text-main: #0f172a;
            --text-muted: #475569;
            --white: #ffffff;
            --hero-gradient: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            --card-shadow: 0 10px 25px rgba(37, 99, 235, 0.1);
            --border-color: rgba(37, 99, 235, 0.1);
        }

        body {
            background: #f0f9ff;
            background-image: radial-gradient(at 0% 0%, #eff6ff 0%, transparent 50%),
                radial-gradient(at 100% 0%, #e0f2fe 100% 0%, transparent 50%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        .navbar {
            background: var(--hero-gradient) !important;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .page-container {
            max-width: 850px;
            margin: 120px auto 40px;
            padding: 0 20px;
        }

        .job-card {
            background: white;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .job-header {
            background: var(--hero-gradient);
            padding: 40px;
            text-align: center;
            color: white;
        }

        .job-header h2 {
            font-size: 1.75rem;
            margin-bottom: 8px;
        }

        .job-content {
            padding: 40px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        label {
            display: block;
            font-size: 0.8125rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.025em;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.2s;
            background: #f8fafc;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
            background: white;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        .actions {
            margin-top: 40px;
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }

        .btn {
            padding: 12px 28px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-size: 0.9375rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--hero-gradient);
            color: white;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(37, 99, 235, 0.3);
        }

        .btn-secondary {
            background: #f1f5f9;
            color: var(--text-muted);
            text-decoration: none;
        }

        .btn-secondary:hover {
            background: #e2e8f0;
        }

        .status-msg {
            margin-top: 20px;
            padding: 14px;
            border-radius: 8px;
            text-align: center;
            display: none;
            font-weight: 500;
        }

        .status-msg.success {
            background: #dcfce7;
            color: #166534;
            display: block;
        }

        .status-msg.error {
            background: #fee2e2;
            color: #991b1b;
            display: block;
        }

        .back-nav {
            margin-bottom: 25px;
        }

        .back-link {
            color: var(--primary-dark);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 0.9375rem;
            transition: all 0.2s;
        }

        .back-link:hover {
            opacity: 0.8;
            transform: translateX(-3px);
        }

        @media (max-width: 640px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .form-group.full-width {
                grid-column: span 1;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="brand">
            <img src="logo.png" alt="Placement Logo" style="width: 32px; height: 32px; border-radius: 4px;">
        </div>
        <div class="nav-links">
            <a href="index.html" class="btn-back-dashboard">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Sign Out
            </a>
            <a href="recruiter_dashboard.html" class="nav-item">Dashboard</a>
            <a href="recruiter_post_job.html" class="nav-item active">Job Postings</a>
            <a href="#" class="nav-item">Candidates</a>
            <a href="#" class="nav-item">Interviews</a>
            <div class="avatar" id="recruiterAvatar" style="cursor:pointer;" title="Recruiter Profile">T2</div>
        </div>
    </nav>

    <div class="page-container">
        <div class="back-nav">
            <a href="recruiter_dashboard.html" class="back-link">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Back to Dashboard
            </a>
        </div>

        <div class="job-card">
            <div class="job-header">
                <h2>Post a New Job</h2>
                <p>Fill in the details below to create a new job opportunity.</p>
            </div>

            <div class="job-content">
                <form id="jobPostingForm">
                    <div class="form-grid">
                        <div class="form-group full-width">
                            <label for="jobTitle">Job Title</label>
                            <input type="text" id="jobTitle" placeholder="e.g. Senior Software Engineer" required>
                        </div>

                        <div class="form-group">
                            <label for="jobCategory">Category</label>
                            <select id="jobCategory" required>
                                <option value="">Select Category...</option>
                                <option value="engineering">Engineering</option>
                                <option value="design">Design</option>
                                <option value="product">Product Management</option>
                                <option value="marketing">Marketing</option>
                                <option value="sales">Sales</option>
                                <option value="hr">Human Resources</option>
                                <option value="finance">Finance</option>
                                <option value="other">Other</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="jobType">Job Type</label>
                            <select id="jobType" required>
                                <option value="full-time">Full-time</option>
                                <option value="part-time">Part-time</option>
                                <option value="internship">Internship</option>
                                <option value="contract">Contract</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="location">Location</label>
                            <select id="location" required>
                                <option value="onsite">On-site</option>
                                <option value="remote">Remote</option>
                                <option value="hybrid">Hybrid</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="salaryRange">Salary Range (Annual)</label>
                            <input type="text" id="salaryRange" placeholder="e.g. 10LPA - 15LPA" required>
                        </div>

                        <div class="form-group">
                            <label for="deadline">Application Deadline</label>
                            <input type="date" id="deadline" required>
                        </div>

                        <div class="form-group">
                            <label for="experience">Experience Required</label>
                            <input type="text" id="experience" placeholder="e.g. 2-4 years or Freshers" required>
                        </div>

                        <div class="form-group full-width">
                            <label for="jobDescription">Job Description & Requirements</label>
                            <textarea id="jobDescription"
                                placeholder="Provide a detailed description of the role, responsibilities, and key requirements..."
                                required></textarea>
                        </div>
                    </div>

                    <div id="statusMsg" class="status-msg"></div>

                    <div class="actions">
                        <a href="recruiter_dashboard.html" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary" id="postBtn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                            Post Job Opportunity
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase_setup.js';
        import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js';
        import { doc, getDoc, collection, addDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js';

        const jobForm = document.getElementById('jobPostingForm');
        const postBtn = document.getElementById('postBtn');
        const statusMsg = document.getElementById('statusMsg');

        let currentUser = null;
        let recruiterData = null;

        const recruiterAvatar = document.getElementById('recruiterAvatar');

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                // Fetch recruiter company info
                try {
                    const userDoc = await getDoc(doc(db, 'users', user.uid));
                    if (userDoc.exists()) {
                        recruiterData = userDoc.data();
                        if (recruiterData.fullname) {
                            // Update avatar initials
                            recruiterAvatar.textContent = recruiterData.fullname.split(' ').map(n => n.charAt(0)).join('').toUpperCase().substring(0, 2);
                            recruiterAvatar.title = `${recruiterData.fullname} (${recruiterData.company_name || 'Recruiter'})`;
                        }
                    }
                } catch (error) {
                    console.error("Error fetching recruiter info:", error);
                }
            } else {
                window.location.href = 'index.html';
            }
        });

        recruiterAvatar.onclick = () => {
            window.location.href = 'recruiter_profile.html';
        };

        function showStatus(msg, type) {
            statusMsg.textContent = msg;
            statusMsg.className = `status-msg ${type}`;
            statusMsg.style.display = 'block';
            if (type === 'success') {
                setTimeout(() => {
                    window.location.href = 'recruiter_dashboard.html';
                }, 2000);
            }
        }

        jobForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUser) return;

            postBtn.textContent = 'Posting Job...';
            postBtn.disabled = true;

            const jobData = {
                jobTitle: document.getElementById('jobTitle').value,
                jobCategory: document.getElementById('jobCategory').value,
                jobType: document.getElementById('jobType').value,
                location: document.getElementById('location').value,
                salaryRange: document.getElementById('salaryRange').value,
                deadline: document.getElementById('deadline').value,
                experience: document.getElementById('experience').value,
                description: document.getElementById('jobDescription').value,
                recruiterUid: currentUser.uid,
                recruiterName: recruiterData?.fullname || 'Unknown Recruiter',
                companyName: recruiterData?.company_name || 'N/A',
                postedAt: serverTimestamp(),
                status: 'active'
            };

            try {
                await addDoc(collection(db, 'jobs'), jobData);
                showStatus("Job posted successfully! Redirecting...", "success");
            } catch (error) {
                console.error("Error posting job:", error);
                showStatus("Failed to post job. Please try again.", "error");
                postBtn.textContent = 'Post Job Opportunity';
                postBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
