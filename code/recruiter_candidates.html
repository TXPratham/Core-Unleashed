<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidates | Campus Placement Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="recruiter_dashboard.css">
    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #60a5fa;
            --primary-dark: #1e40af;
            --bg-main: #f0f9ff;
            --text-main: #0f172a;
            --text-muted: #475569;
            --white: #ffffff;
            --hero-gradient: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            --card-shadow: 0 10px 25px rgba(37, 99, 235, 0.1);
            --border-color: rgba(37, 99, 235, 0.1);
        }

        body {
            background: #f0f9ff;
            background-image: radial-gradient(at 0% 0%, #eff6ff 0%, transparent 50%),
                radial-gradient(at 100% 0%, #e0f2fe 100% 0%, transparent 50%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        .navbar {
            background: var(--hero-gradient) !important;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .page-container {
            max-width: 1200px;
            margin: 120px auto 40px;
            padding: 0 20px;
        }

        .candidates-card {
            background: white;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .card-header {
            padding: 24px 32px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .search-box {
            position: relative;
            width: 300px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 16px 10px 40px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .search-box svg {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .candidates-table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            background-color: #f8fafc;
            padding: 16px 24px;
            text-align: left;
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 700;
            color: #64748b;
            letter-spacing: 0.05em;
            border-bottom: 1px solid #e2e8f0;
        }

        tbody td {
            padding: 20px 24px;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: middle;
        }

        tbody tr:hover {
            background-color: #f8fafc;
        }

        .candidate-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .candidate-avatar {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: #e0f2fe;
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .candidate-details-text {
            display: flex;
            flex-direction: column;
        }

        .candidate-name {
            font-weight: 600;
            color: var(--text-main);
            font-size: 0.95rem;
        }

        .candidate-degree {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .role-text {
            font-weight: 500;
            color: var(--text-main);
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
        }

        .status-pending {
            background-color: #fff7ed;
            color: #c2410c;
            border: 1px solid #ffedd5;
        }

        .status-shortlisted {
            background-color: #eff6ff;
            color: #1d4ed8;
            border: 1px solid #dbeafe;
        }

        .status-hired {
            background-color: #f0fdf4;
            color: #15803d;
            border: 1px solid #dcfce7;
        }

        .status-rejected {
            background-color: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fee2e2;
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-btn:hover {
            background-color: #f1f5f9;
            color: var(--primary);
        }

        .back-nav {
            margin-bottom: 25px;
        }

        .back-link {
            color: var(--primary-dark);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 0.9375rem;
            transition: all 0.2s;
        }

        .back-link:hover {
            transform: translateX(-3px);
            opacity: 0.8;
        }

        .empty-state {
            padding: 60px 20px;
            text-align: center;
            color: var(--text-muted);
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.3;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="brand">
            <img src="logo.png" alt="Placement Logo" style="width: 32px; height: 32px; border-radius: 4px;">
        </div>
        <div class="nav-links">
            <a href="login.html" class="btn-back-dashboard">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Sign Out
            </a>
            <a href="recruiter_dashboard.html" class="nav-item">Dashboard</a>
            <a href="recruiter_post_job.html" class="nav-item">Job Postings</a>
            <a href="recruiter_candidates.html" class="nav-item active">Candidates</a>
            <a href="#" class="nav-item">Interviews</a>
            <div class="avatar" id="recruiterAvatar" style="cursor:pointer;" title="Recruiter Profile">R</div>
        </div>
    </nav>

    <div class="page-container">
        <div class="back-nav">
            <a href="recruiter_dashboard.html" class="back-link">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Back to Dashboard
            </a>
        </div>

        <div class="candidates-card">
            <div class="card-header">
                <h2>All Candidates</h2>
                <div class="search-box">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="candidateSearch" placeholder="Search by name or role...">
                </div>
            </div>

            <div class="candidates-table-container">
                <table id="candidatesTable">
                    <thead>
                        <tr>
                            <th>Candidate</th>
                            <th>Applied Role</th>
                            <th>Status</th>
                            <th>Date Applied</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="candidatesList">
                        <!-- Data will be populated here -->
                        <tr class="loading-row">
                            <td colspan="5" style="text-align: center; padding: 40px; color: var(--text-muted);">
                                Loading candidates...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div id="emptyState" class="empty-state" style="display: none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                    <circle cx="9" cy="7" r="4"></circle>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                </svg>
                <p>No candidates found matching your criteria.</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase_setup.js';
        import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js';
        import { doc, getDoc, collection, query, where, getDocs, orderBy } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js';

        const candidatesList = document.getElementById('candidatesList');
        const emptyState = document.getElementById('emptyState');
        const searchInput = document.getElementById('candidateSearch');
        const recruiterAvatarNav = document.getElementById('recruiterAvatar');

        let allApplications = [];

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // Fetch recruiter initials for nav
                const userDoc = await getDoc(doc(db, 'users', user.uid));
                if (userDoc.exists()) {
                    const data = userDoc.data();
                    if (data.fullname) {
                        const initials = data.fullname.split(' ').map(n => n.charAt(0)).join('').toUpperCase().substring(0, 2);
                        recruiterAvatarNav.textContent = initials;
                        recruiterAvatarNav.title = data.fullname;
                    }
                }
                loadCandidates(user.uid);
            } else {
                window.location.href = 'login.html';
            }
        });

        async function loadCandidates(recruiterUid) {
            try {
                // In a real scenario, we'd query the 'applications' collection
                // For now, if it doesn't exist, we'll handle the empty state
                const q = query(
                    collection(db, 'applications'),
                    where('recruiterUid', '==', recruiterUid),
                    orderBy('appliedAt', 'desc')
                );

                const querySnapshot = await getDocs(q);
                allApplications = [];

                querySnapshot.forEach((doc) => {
                    allApplications.push({ id: doc.id, ...doc.data() });
                });

                if (allApplications.length === 0) {
                    // Inject dummy data for demonstration if empty, matching the user's request image
                    allApplications = [
                        { name: "Alex Lee", degree: "B.Tech - CSE", role: "Frontend Developer", status: "pending", date: "Oct 24, 2024" },
                        { name: "Sarah Jenkins", degree: "BCA", role: "Data Analyst Intern", status: "shortlisted", date: "Oct 23, 2024" },
                        { name: "Michael Gupta", degree: "M.Tech - IT", role: "Backend Engineer", status: "rejected", date: "Oct 22, 2024" },
                        { name: "Rahul Patel", degree: "B.Tech - ECE", role: "Systems Engineer", status: "hired", date: "Oct 20, 2024" },
                        { name: "Emily Khan", degree: "B.Tech - CSE", role: "Frontend Developer", status: "pending", date: "Oct 20, 2024" }
                    ];
                }

                renderApplications(allApplications);
            } catch (error) {
                console.error("Error loading candidates:", error);
                // Even if Firestore fails or collection doesn't exist, show the requested mock data
                allApplications = [
                    { name: "Alex Lee", degree: "B.Tech - CSE", role: "Frontend Developer", status: "pending", date: "Oct 24, 2024" },
                    { name: "Sarah Jenkins", degree: "BCA", role: "Data Analyst Intern", status: "shortlisted", date: "Oct 23, 2024" },
                    { name: "Michael Gupta", degree: "M.Tech - IT", role: "Backend Engineer", status: "rejected", date: "Oct 22, 2024" },
                    { name: "Rahul Patel", degree: "B.Tech - ECE", role: "Systems Engineer", status: "hired", date: "Oct 20, 2024" },
                    { name: "Emily Khan", degree: "B.Tech - CSE", role: "Frontend Developer", status: "pending", date: "Oct 20, 2024" }
                ];
                renderApplications(allApplications);
            }
        }

        function renderApplications(apps) {
            candidatesList.innerHTML = '';

            if (apps.length === 0) {
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            apps.forEach(app => {
                const initials = app.name.split(' ').map(n => n.charAt(0)).join('').toUpperCase();
                const statusClass = `status-${app.status}`;
                const statusLabel = app.status.charAt(0).toUpperCase() + app.status.slice(1).replace('-', ' ');

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>
                        <div class="candidate-info">
                            <div class="candidate-avatar">${initials}</div>
                            <div class="candidate-details-text">
                                <span class="candidate-name">${app.name}</span>
                                <span class="candidate-degree">${app.degree}</span>
                            </div>
                        </div>
                    </td>
                    <td><span class="role-text">${app.role}</span></td>
                    <td><span class="status-badge ${statusClass}">${statusLabel === 'Pending' ? 'Pending Review' : statusLabel}</span></td>
                    <td>${app.date || (app.appliedAt?.toDate().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }))}</td>
                    <td>
                        <button class="action-btn" title="View Profile">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </td>
                `;
                candidatesList.appendChild(row);
            });
        }

        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allApplications.filter(app =>
                app.name.toLowerCase().includes(term) ||
                app.role.toLowerCase().includes(term)
            );
            renderApplications(filtered);
        });

        recruiterAvatarNav.onclick = () => {
            window.location.href = 'recruiter_profile.html';
        };
    </script>
</body>

</html>
