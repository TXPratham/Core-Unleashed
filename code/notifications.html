<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notifications</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f4f6f9;
margin:0;
padding:0;
}

.header{
background:#2c3e50;
color:white;
padding:18px;
text-align:center;
font-size:22px;
}

.container{
width:90%;
max-width:500px;
margin:25px auto;
}

.notification{
display:flex;
align-items:center;
background:white;
padding:15px;
margin-bottom:12px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
display:none;
}

.icon{
font-size:24px;
margin-right:12px;
}

.text{
flex:1;
}

.time{
font-size:12px;
color:gray;
}

.quote{
text-align:center;
margin-top:20px;
font-style:italic;
color:#555;
}

.button{
display:block;
width:200px;
margin:25px auto;
text-align:center;
padding:10px;
background:#3498db;
color:white;
text-decoration:none;
border-radius:6px;
}

.button:hover{
background:#2980b9;
}

</style>
</head>

<body>

<div class="header">
🔔 Student Notifications
</div>

<div class="container">

<div class="notification">
<div class="icon">📢</div>
<div class="text">
Amazon invited students for internship
