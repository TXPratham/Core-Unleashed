<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notifications</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f4f6f9;
margin:0;
padding:0;
text-align:center;
}

.header{
background:#2c3e50;
color:white;
padding:20px;
font-size:24px;
}

.container{
width:60%;
margin:30px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.notification{
background:#e8f0fe;
padding:15px;
margin:10px 0;
border-radius:6px;
font-size:16px;
display:none;
}

.quote{
margin-top:20px;
font-style:italic;
color:#555;
}

.button{
display:inline-block;
margin-top:20px;
padding:10px 20px;
background:#3498db;
color:white;
text-decoration:none;
border-radius:5px;
}

.button:hover{
background:#2980b9;
}

</style>
</head>

<body>

<div class="header">
Core Unleashed - Student Notifications
</div>

<div class="container">

<div class="notification">Amazon invited students for internship - Today</div>
<div class="notification">Pre-placement talk scheduled tomorrow - 10 AM</div>
<div class="notification">Microsoft interview on Monday - 9 AM</div>
<div class="notification">Google summer internship applications open</div>

<div class="quote">
"Success comes from continuous learning and consistent effort."
</div>

<a href="main.html" class="button">Back to Dashboard</a>

</div>

<script>

let notifications = document.querySelectorAll(".notification");
let index = 0;

function showNotification(){
if(index < notifications.length){
notifications[index].style.display = "block";
index++;
setTimeout(showNotification,2000);
}
}

showNotification();

</script>

</body>
</html>
