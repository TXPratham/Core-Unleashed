<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notifications</title>

<style>
/* Full-page layout */
body{
  font-family: Arial, sans-serif;
  background:#f4f6f9;
  margin:0;
  padding:0;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Header */
.header{
  background:#2c3e50;
  color:white;
  padding:18px;
  text-align:center;
  font-size:22px;
  flex: 0 0 auto;
}

/* Notification container fills the page */
.container{
  width:90%;
  max-width:500px;
  margin:0 auto;
  background:white;
  flex:1 1 auto;
  padding:20px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  overflow:hidden;
  position: relative;
}

/* Notifications wrapper */
.scrolling-notifications {
  display: flex;
  flex-direction: column;
  position: absolute;
  width: 100%;
  animation: bounceUpDown 8s ease-in-out infinite alternate;
}

/* Notification cards */
.notification{
  display:flex;
  align-items:center;
  background:#e8f0fe;
  padding:20px;
  margin-bottom:15px;
  border-radius:10px;
  font-size:18px;
}

/* Notification icon */
.icon{
  font-size:24px;
  margin-right:12px;
}

/* Notification text */
.text{
  flex:1;
}

/* Timestamp */
.time{
  font-size:12px;
  color:gray;
}

/* Motivational quote */
.quote{
  text-align:center;
  margin-top:20px;
  font-style:italic;
  color:#555;
}

/* Back button */
.button{
  display:block;
  width:200px;
  margin:25px auto;
  text-align:center;
  padding:10px;
  background:#3498db;
  color:white;
  text-decoration:none;
  border-radius:6px;
}

.button:hover{
  background:#2980b9;
}

/* Bouncy up-and-down animation */
@keyframes bounceUpDown {
  0%   { transform: translateY(0); }
  50%  { transform: translateY(-50px); }
  100% { transform: translateY(0); }
}
</style>
</head>

<body>

<div class="header">
🔔 Student Notifications
</div>

<div class="container">

<div class="scrolling-notifications">
  <div class="notification">
    <div class="icon">📢</div>
    <div class="text">
      Amazon invited students for internship
      <div class="time">Today</div>
    </div>
  </div>

  <div class="notification">
    <div class="icon">🎤</div>
