<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post New Job | Campus Placement Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="recruiter_dashboard.css">
    <link rel="stylesheet" href="recruiter_post_job.css">
</head>

<body>
    <nav class="navbar">
        <div class="brand">
            <img src="logo.png" alt="Placement Logo" style="width: 32px; height: 32px; border-radius: 4px;">
        </div>
        <div class="nav-links">
            <a href="index.html" class="btn-back-dashboard">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Sign Out
            </a>
            <a href="recruiter_dashboard.html" class="nav-item">Dashboard</a>
            <a href="recruiter_post_job.html" class="nav-item active">Job Postings</a>
            <a href="#" class="nav-item">Candidates</a>
            <a href="#" class="nav-item">Interviews</a>
            <div class="avatar" id="recruiterAvatar" style="cursor:pointer;" title="Recruiter Profile">T2</div>
        </div>
    </nav>

    <div class="page-container">
        <div class="back-nav">
            <a href="recruiter_dashboard.html" class="back-link">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Back to Dashboard
            </a>
        </div>

        <div class="job-card">
            <div class="job-header">
                <h2>Post a New Job</h2>
                <p>Fill in the details below to create a new job opportunity.</p>
            </div>

            <div class="job-content">
                <form id="jobPostingForm">
                    <div class="form-grid">
                        <div class="form-group full-width">
                            <label for="jobTitle">Job Title</label>
                            <input type="text" id="jobTitle" placeholder="e.g. Senior Software Engineer" required>
                        </div>

                        <div class="form-group">
                            <label for="jobCategory">Category</label>
                            <select id="jobCategory" required>
                                <option value="">Select Category...</option>
                                <option value="engineering">Engineering</option>
                                <option value="design">Design</option>
                                <option value="product">Product Management</option>
                                <option value="marketing">Marketing</option>
                                <option value="sales">Sales</option>
                                <option value="hr">Human Resources</option>
                                <option value="finance">Finance</option>
                                <option value="other">Other</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="jobType">Job Type</label>
                            <select id="jobType" required>
                                <option value="full-time">Full-time</option>
                                <option value="part-time">Part-time</option>
                                <option value="internship">Internship</option>
                                <option value="contract">Contract</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="location">Location</label>
                            <select id="location" required>
                                <option value="onsite">On-site</option>
                                <option value="remote">Remote</option>
                                <option value="hybrid">Hybrid</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="salaryRange">Salary Range (Annual)</label>
                            <input type="text" id="salaryRange" placeholder="e.g. 10LPA - 15LPA" required>
                        </div>

                        <div class="form-group">
                            <label for="deadline">Application Deadline</label>
                            <input type="date" id="deadline" required>
                        </div>

                        <div class="form-group">
                            <label for="experience">Experience Required</label>
                            <input type="text" id="experience" placeholder="e.g. 2-4 years or Freshers" required>
                        </div>

                        <div class="form-group full-width">
                            <label for="jobDescription">Job Description & Requirements</label>
                            <textarea id="jobDescription"
                                placeholder="Provide a detailed description of the role, responsibilities, and key requirements..."
                                required></textarea>
                        </div>
                    </div>

                    <div id="statusMsg" class="status-msg"></div>

                    <div class="actions">
                        <a href="recruiter_dashboard.html" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary" id="postBtn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                            Post Job Opportunity
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script type="module" src="recruiter_post_job.js"></script>
</body>


</html>
